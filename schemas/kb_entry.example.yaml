projection_schema_version: khaos-brain.card-projection.v1
authority_generation_id: generation-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
authority_scope: public
logicguard_model_id: khaos-card-model-xxx
logicguard_node_id: node-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
logicguard_block_id: block-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
logicguard_revision_id: revision-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
logicguard_mesh_id: mesh-public
logicguard_mesh_revision_id: mesh-rev-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
projection_digest: sha256:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
logicguard_open_role_gaps:
  - evidence
  - warrant
id: model-xxx
title: Short human-readable title # Prefer a predicted relation or outcome, including runtime-behavior predictions when applicable
type: model # model | preference | heuristic | fact
scope: public # public | private; user-specific interaction models should usually be private
# Runtime-behavior cards are valid when the runtime identity is explicit enough to audit later.
# Example runtime-oriented path: [codex, runtime-behavior, prompt-following]
# User-specific cards are also valid when they stay predictive and task-conditioned rather than sounding like personality labels.
domain_path:
  - work
  - reporting
  - ppt
# Add cross routes when the same card should also be found from prompting, tool-use, workflow, or runtime-family directions.
cross_index:
  - design/presentation/aesthetics
  - communication/slides/visual-quality
# Derived display only. Sleep's projector recomputes this list exclusively from
# grounded exact ModelMesh relations. It is never semantic or retrieval authority.
related_cards: []
tags:
  - presentation
  - slides
trigger_keywords:
  - ppt
  - slide
  - report
if:
  notes: Define the conditions under which this model card should apply.
action:
  description: What action, input, or situation is being evaluated.
predict:
  expected_result: The expected or likely result under the stated conditions.
  # Alternatives often come from contrastive observations where a weaker earlier path
  # and a stronger revised path were both recorded explicitly during postflight.
  alternatives:
    - when: If the audience is deeply technical
      result: A more structured and engineering-oriented presentation is likely preferred.
use:
  guidance: How Codex should use this prediction in its own output or behavior.
# Optional display translations preserved by the projector. The exact
# LogicGuard nodes above remain semantic authority.
i18n:
  zh-CN:
    title: 中文显示标题
    if:
      notes: 中文适用场景
    action:
      description: 中文动作或条件描述
    predict:
      expected_result: 中文预测结果
      alternatives:
        - when: 中文分支条件
          result: 中文分支结果
    use:
      guidance: 中文使用方式
confidence: 0.8
source:
  - origin: where this came from
    date: YYYY-MM-DD
status: trusted # candidate | trusted | deprecated
updated_at: YYYY-MM-DD
