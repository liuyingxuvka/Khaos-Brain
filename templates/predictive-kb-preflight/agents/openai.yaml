policy:
  allow_implicit_invocation: true

interface:
  display_name: "Predictive KB Preflight"
  short_description: "Consult the shared predictive KB before coding, planning, writing, or repository work"
  default_prompt: "Use $predictive-kb-preflight implicitly as a required default preflight for coding, planning, writing, and repository work. Run the KB scan before substantive work. For long mixed tasks, include phase-change KB checkpoints and rerun the scan before a substantially different action class or risk surface begins, such as code edits, packaging, privacy-sensitive handling, automation changes, organization-KB work, GitHub push/tag/release, or public publication; do not rerun for every repeated same-type subtask. For non-trivial tasks do not treat work as complete until one explicit KB postflight check has been performed. Keep canonical machine interfaces separate from localized display projection when working on this KB: CLI tools, launchers, automation payloads, and install checks should use canonical machine output and encoding-stable JSON; Chinese display belongs in UI view models, route display labels, and i18n.zh-CN. After meaningful work, record a KB follow-up observation whenever the task exposed a reusable signal, skill/plugin usage lesson, subagent/delegation usage lesson, miss, route gap, card weakness, or KB-process failure. Apply mistake-first priority during KB postflight: Codex's own mistakes, weak paths, missed instructions, failed validations, tool or skill misuse, user corrections, and later correction episodes are the highest-priority observation evidence; preserve them with contrastive fields whenever possible, while still allowing successful reusable patterns to be recorded."
