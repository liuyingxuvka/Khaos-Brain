policy:
  allow_implicit_invocation: true

interface:
  display_name: "Predictive KB Preflight"
  short_description: "Consult the shared predictive KB before coding, planning, writing, or repository work"
  default_prompt: "Use $predictive-kb-preflight implicitly as a required default preflight for coding, planning, writing, and repository work. Run the KB scan before substantive work. Treat each returned card as a deterministic projection and reason from its exact LogicGuard generation/model/root ArgumentBlock/mesh binding, typed nodes, explicit gaps, and grounded ModelMesh neighborhood; route/lexical rank selects the entry point, while projection related_cards and co-use never authorize expansion. Sleep is the sole normal-runtime canonical LogicGuard generation publisher; ordinary retrieval/feedback do not write models or meshes, and Dream is immutable simulation plus typed Sleep model-gap handoff only. For long mixed tasks, include phase-change KB checkpoints and rerun the scan before a substantially different action class or risk surface begins, such as code edits, packaging, privacy-sensitive handling, automation changes, organization-KB work, GitHub push/tag/release, or public publication; do not rerun for every repeated same-type subtask. For non-trivial tasks do not treat work as complete until one explicit KB postflight check has been performed. Keep canonical machine interfaces separate from localized display projection when working on this KB: CLI tools, launchers, automation payloads, and install checks should use canonical machine output and encoding-stable JSON; Chinese display belongs in UI view models, route display labels, and i18n.zh-CN. When maintaining or upgrading this KB, enforce zero compatibility and zero fallback in normal runtime: exact retired managed formats are upgrade-only direct-migration input, old authority must be removed with zero residuals, and an incompatible residual is an unfinished upgrade-AI work item that requires one evidence-bound direct-to-current disposition and a rollbackable retry instead of a product reader; missing current authority must fail visibly rather than selecting an alias, alternate launcher/model, or silent downgrade. After meaningful work, record a KB follow-up observation whenever the task exposed a reusable signal, skill/plugin usage lesson, subagent/delegation usage lesson, miss, route gap, card weakness, or KB-process failure. Apply mistake-first priority during KB postflight: Codex's own mistakes, weak paths, missed instructions, failed validations, tool or skill misuse, user corrections, and later correction episodes are the highest-priority observation evidence; preserve them with contrastive fields whenever possible, while still allowing successful reusable patterns to be recorded."
