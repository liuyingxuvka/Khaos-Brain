name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python tests
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    env:
      SKILLGUARD_COMMIT: ab92d6c5829504d48c358fb04263469d2ee822ab
      CODEX_KB_AUTOMATION_MODEL: ci-current-model
      CODEX_KB_AUTOMATION_REASONING_EFFORT: xhigh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare validation toolchains
        run: |
          git init "$RUNNER_TEMP/skillguard"
          git -C "$RUNNER_TEMP/skillguard" remote add origin https://github.com/liuyingxuvka/SkillGuard.git
          git -C "$RUNNER_TEMP/skillguard" fetch --depth 1 origin "$SKILLGUARD_COMMIT"
          git -C "$RUNNER_TEMP/skillguard" checkout --detach FETCH_HEAD
          test -f "$RUNNER_TEMP/skillguard/.agents/skills/skillguard/scripts/skillguard_compile.py"
          npm install --global @fission-ai/openspec@1.6.0
          echo "KHAOS_BRAIN_SKILLGUARD_VALIDATION_ROOT=$RUNNER_TEMP/skillguard/.agents/skills/skillguard" >> "$GITHUB_ENV"

      - name: Install Codex KB integration
        run: python scripts/install_codex_kb.py --json

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run installer health check
        run: python scripts/install_codex_kb.py --check --json

      - name: Run desktop viewer smoke check
        run: python scripts/kb_desktop.py --repo-root . --check

  tag-release-receipt:
    name: Verify tag release receipt
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Verify exact main validation receipt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --no-tags --depth=1 origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          gh api --method GET "repos/$GITHUB_REPOSITORY/actions/runs" \
            -f branch=main \
            -f head_sha="$GITHUB_SHA" \
            -f status=success \
            -f event=push \
            -f per_page=100 > "$RUNNER_TEMP/main-success-runs.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "main-success-runs.json").read_text(
                  encoding="utf-8"
              )
          )
          sha = os.environ["GITHUB_SHA"]
          runs = [
              run
              for run in payload.get("workflow_runs", [])
              if run.get("name") == "tests"
              and run.get("event") == "push"
              and run.get("head_branch") == "main"
              and run.get("head_sha") == sha
              and run.get("conclusion") == "success"
          ]
          if not runs:
              raise SystemExit("exact successful main validation receipt is unavailable")
          print(f"verified-main-run={runs[0]['id']} sha={sha}")
          PY
