name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      SKILLGUARD_COMMIT: dadcc388de63b5ad4fb03a143bf320c9dcd80b0c

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare validation toolchains
        run: |
          git init "$RUNNER_TEMP/skillguard"
          git -C "$RUNNER_TEMP/skillguard" remote add origin https://github.com/liuyingxuvka/SkillGuard.git
          git -C "$RUNNER_TEMP/skillguard" fetch --depth 1 origin "$SKILLGUARD_COMMIT"
          git -C "$RUNNER_TEMP/skillguard" checkout --detach FETCH_HEAD
          test -f "$RUNNER_TEMP/skillguard/.agents/skills/skillguard/scripts/skillguard_compile.py"
          npm install --global @fission-ai/openspec@1.6.0
          echo "KHAOS_BRAIN_SKILLGUARD_VALIDATION_ROOT=$RUNNER_TEMP/skillguard/.agents/skills/skillguard" >> "$GITHUB_ENV"

      - name: Install Codex KB integration
        run: python scripts/install_codex_kb.py --json

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run installer health check
        run: python scripts/install_codex_kb.py --check --json

      - name: Run desktop viewer smoke check
        run: python scripts/kb_desktop.py --repo-root . --check
