contract_version: 1
change: make-khaos-brain-logicguard-native

obligations:
  - id: req.logicguard.flowguard-models
    source: "specs/khaos-logicguard-assurance/spec.md#Requirement: Executable FlowGuard models own behavior assurance"
    claim: Current FlowGuard models and known-bad calibrations pass.
    required: true
    evidence: [check.logicguard.flowguard]
  - id: req.logicguard.consumer-native
    source: "specs/khaos-logicguard-assurance/spec.md#Requirement: LogicGuard and installed skills remain consumer-native"
    claim: Installed skills contain no author-control dependency.
    required: true
    evidence: [check.logicguard.install]
  - id: req.logicguard.author-separate
    source: "specs/khaos-logicguard-assurance/spec.md#Requirement: Author contracts are separate maintenance evidence"
    claim: Author contracts are current and remain source-only.
    required: true
    evidence: [check.logicguard.author]
  - id: req.logicguard.alignment
    source: "specs/khaos-logicguard-assurance/spec.md#Requirement: Model, code, fields, and target-owned tests align"
    claim: Model, code, and unique target-owned tests align.
    required: true
    evidence: [check.logicguard.alignment]
  - id: req.logicguard.final-snapshot
    source: "specs/khaos-logicguard-assurance/spec.md#Requirement: Final validation has one stable execution snapshot"
    claim: Final aggregate evidence is current and terminal.
    required: true
    evidence: [check.logicguard.aggregate]

checks:
  - id: check.logicguard.flowguard
    owner: flowguard-suite
    command: python
    args: [scripts/run_flowguard_suite.py, --json, --no-write-receipt]
  - id: check.logicguard.install
    owner: consumer-install-assurance
    command: python
    args: [scripts/check_consumer_install_assurance.py, --json]
  - id: check.logicguard.author
    owner: author-contract-audit
    command: python
    args: [scripts/check_kb_skillguard.py, --source-only, --json]
  - id: check.logicguard.alignment
    owner: model-test-alignment
    command: python
    args: [scripts/check_kb_model_test_alignment.py, --json]
  - id: check.logicguard.aggregate
    owner: logicguard-native-readiness
    command: python
    args: [scripts/check_khaos_logicguard_native_readiness.py, --json]

claim_boundary: >
  LogicGuard product assurance and author-side skill maintenance are distinct.
  Publication and third-party compatibility remain outside this contract.
