contract_version: 1
change: converge-kb-learning-and-upgrade-migration

obligations:
  - id: req.consumer-independent-skills
    source: "specs/kb-runtime-assurance/spec.md#Requirement: Maintained skills are independent consumer products"
    claim: Installed maintained skills contain no author-control files or runtime dependency.
    required: true
    evidence: [check.assurance.aggregate]
  - id: req.author-side-maintenance
    source: "specs/kb-runtime-assurance/spec.md#Requirement: SkillGuard is author-side maintenance supervision"
    claim: Source contracts prove target depth without shipping their authority.
    required: true
    evidence: [check.assurance.author-contracts]
  - id: req.disjoint-maintenance-units
    source: "specs/kb-runtime-assurance/spec.md#Requirement: Maintenance units and test evidence are disjoint"
    claim: Every maintained skill has unique obligations and test nodes.
    required: true
    evidence: [check.assurance.alignment]
  - id: req.target-native-assurance
    source: "specs/kb-runtime-assurance/spec.md#Requirement: FlowGuard and target-native checks own consumer assurance"
    claim: Current target-owned checks and FlowGuard evidence close consumer readiness.
    required: true
    evidence: [check.assurance.aggregate]
  - id: req.manual-update-native-closure
    source: "specs/kb-runtime-assurance/spec.md#Requirement: Manual update closes in one native route"
    claim: Manual update closes directly with its own immutable receipt.
    required: true
    evidence: [check.assurance.aggregate]
  - id: req.official-openspec-external
    source: "specs/kb-runtime-assurance/spec.md#Requirement: Official OpenSpec remains external"
    claim: Official OpenSpec is not a SkillGuard-maintained target.
    required: true
    evidence: [check.assurance.openspec]

checks:
  - id: check.assurance.author-contracts
    owner: author-contract-audit
    command: python
    args: [scripts/check_kb_skillguard.py, --source-only, --json]
  - id: check.assurance.alignment
    owner: model-test-alignment
    command: python
    args: [scripts/check_kb_model_test_alignment.py, --json]
  - id: check.assurance.openspec
    owner: official-openspec
    command: openspec
    args: [validate, converge-kb-learning-and-upgrade-migration, --type, change, --strict, --json, --no-interactive]
  - id: check.assurance.aggregate
    owner: chaos-brain-readiness
    command: python
    args: [scripts/check_chaos_brain_readiness.py, --json]

claim_boundary: >
  This contract separates author-side skill maintenance from consumer runtime
  assurance. It does not publish a release or certify third-party skill
  compatibility.
